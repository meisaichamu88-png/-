<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京大生のための講義室＆出席ナビ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 🌗 高コントラスト・ダークモード（.dark）時の完全上書き指定 */
        .dark body { background-color: #030712 !important; color: #f8fafc !important; }
        
        /* カード類の背景を明るめの紺色にして境界線をクッキリに */
        .dark #view-nav, .dark #view-table, .dark #view-edit { 
            background-color: #111827 !important; 
            border-color: #374151 !important; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
        }
        
        /* テーブルのヘッダーと時限ラベル */
        .dark .dark-grid-head { background-color: #1f2937 !important; color: #f3f4f6 !important; border-color: #374151 !important; }
        .dark .dark-grid-label { background-color: #1f2937 !important; color: #f3f4f6 !important; border-color: #374151 !important; }
        .dark table, .dark th, .dark td { border-color: #374151 !important; }
        .dark .dark-grid-cell-empty { color: #6b7280 !important; }
        
        /* モーダルポップアップ */
        .dark .dark-modal { background-color: #1f2937 !important; color: #f9fafb !important; border: 1px solid #4b5563 !important; }
        
        /* 入力フォーム関連 */
        .dark input, .dark select, .dark textarea { 
            background-color: #030712 !important; 
            color: #ffffff !important; 
            border-color: #4b5563 !important; 
        }
        .dark input:focus, .dark select:focus, .dark textarea:focus {
            outline: 2px solid #22d3ee !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between transition-colors duration-200">

    <header class="bg-cyan-900 text-white py-4 px-6 shadow-md relative">
        <div class="max-w-md mx-auto flex flex-col items-center w-full space-y-3">
            <div class="flex justify-between items-center w-full">
                <div class="w-8"></div>
                <h1 class="text-xl font-bold tracking-wider">KU 講義ナビ</h1>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl bg-cyan-950 hover:bg-cyan-800 flex items-center justify-center text-lg cursor-pointer transition-all shadow-inner border border-cyan-800" id="theme-btn" title="テーマ切り替え">
                    🌙
                </button>
            </div>
            
            <div class="flex bg-cyan-950 p-1 rounded-xl w-full text-xs text-center font-semibold border border-cyan-900">
                <button onclick="switchTab('nav')" id="tab-nav" class="w-1/3 py-2 rounded-lg bg-cyan-700 text-white cursor-pointer transition-all">📍 ナビ</button>
                <button onclick="switchTab('table')" id="tab-table" class="w-1/3 py-2 rounded-lg text-cyan-200 hover:text-white cursor-pointer transition-all">📅 時間割表</button>
                <button onclick="switchTab('edit')" id="tab-edit" class="w-1/3 py-2 rounded-lg text-cyan-200 hover:text-white cursor-pointer transition-all">⚙️ 登録・編集</button>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 flex flex-col justify-start items-center max-w-md mx-auto w-full">
        
        <div id="view-nav" class="bg-white rounded-2xl shadow-xl p-6 w-full border border-slate-200 space-y-6">
            <div class="flex items-center justify-between text-sm text-cyan-700 dark:text-cyan-400 font-bold" id="nav-status-header">
                <div class="flex items-center space-x-2">
                    <span class="flex h-2 w-2 relative">
                        <span id="status-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                        <span id="status-dot" class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
                    </span>
                    <span id="status-label">現在の授業</span>
                </div>
                <span id="current-time-display" class="text-slate-400 dark:text-slate-400 font-mono font-bold"></span>
            </div>

            <div>
                <h2 id="class-name" class="text-2xl font-black text-slate-900 dark:text-white mb-1">授業がありません</h2>
                <p id="class-room" class="text-lg text-amber-600 dark:text-amber-400 font-bold">📍 -</p>
            </div>

            <div id="attendance-counter-box" class="bg-cyan-50/50 dark:bg-slate-950 border border-cyan-100 dark:border-slate-800 rounded-xl p-4 flex justify-around text-center hidden">
                <div class="w-1/3">
                    <span class="block text-xs font-bold text-slate-400 dark:text-slate-400 uppercase tracking-wider">出席</span>
                    <span id="count-present" class="text-2xl font-black text-cyan-600 dark:text-cyan-400">0</span><span class="text-xs text-slate-500 dark:text-slate-400">回</span>
                </div>
                <div class="border-l border-slate-200 dark:border-slate-800"></div>
                <div class="w-1/3">
                    <span class="block text-xs font-bold text-slate-400 dark:text-slate-400 uppercase tracking-wider">遅刻</span>
                    <span id="count-late" class="text-2xl font-black text-amber-500 dark:text-amber-400">0</span><span class="text-xs text-slate-500 dark:text-slate-400">回</span>
                </div>
                <div class="border-l border-slate-200 dark:border-slate-800"></div>
                <div class="w-1/3">
                    <span class="block text-xs font-bold text-slate-400 dark:text-slate-400 uppercase tracking-wider">欠席</span>
                    <span id="count-absent" class="text-2xl font-black text-rose-500 dark:text-rose-400">0</span><span class="text-xs text-slate-500 dark:text-slate-400">回</span>
                </div>
            </div>

            <div class="space-y-3">
                <button id="map-toggle-btn" onclick="toggleMap()" class="w-full text-xs bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 py-2.5 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-all font-bold border dark:border-slate-700">
                    🗺️ キャンパスマップを表示
                </button>
                <div id="map-container" class="hidden w-full h-[250px] rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 flex items-center justify-center">
                    <iframe id="map-iframe" class="w-full h-full" src="" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    <div id="map-error-message" class="hidden text-slate-400 text-sm font-medium tracking-wide">🗺️ 地図を取得できませんでした</div>
                </div>
            </div>

            <div class="bg-slate-50 dark:bg-slate-950 rounded-xl p-4 text-sm text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-800">
                <p class="font-bold text-slate-800 dark:text-cyan-400 mb-1">🗺️ 行き方ナビ</p>
                <p id="class-nav">「時間割表」のマスをクリックして授業を入力してください！</p>
            </div>

            <div id="action-buttons" class="space-y-3 text-center">
                <div id="main-buttons-box" class="flex flex-col space-y-2">
                    <button id="attendance-btn" onclick="recordAttendance('present')" disabled class="w-full bg-slate-300 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold py-4 px-4 rounded-xl text-lg cursor-not-allowed">
                        🔴 出席ボタン（時間外）
                    </button>
                    <button id="late-btn" onclick="recordAttendance('late')" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 px-4 rounded-xl text-sm transition-all hidden cursor-pointer shadow-md shadow-amber-500/10">
                        ⚠️ 遅刻を記録する
                    </button>
                </div>
                <button id="undo-btn" onclick="undoAttendance()" class="text-xs text-slate-400 dark:text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 underline font-bold cursor-pointer transition-all hidden">
                    ↩️ 間違えて押した（記録を取り消す）
                </button>
                <button id="absent-btn" onclick="recordAttendance('absent')" class="w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold py-2 px-4 rounded-xl text-sm transition-all hidden border dark:border-slate-700">
                    💤 この授業を欠席する
                </button>
            </div>
        </div>

        <div id="view-table" class="bg-white rounded-2xl shadow-xl p-4 w-full border border-slate-200 hidden overflow-x-auto">
            <h2 class="text-lg font-black text-slate-900 dark:text-white mb-1 text-center">今期の時間割一覧</h2>
            <p class="text-[10px] text-slate-400 dark:text-slate-400 text-center mb-3">※マスをタップすると詳細・出席状況を確認できます</p>
            
            <table class="w-full text-center border-collapse text-xs">
                <thead>
                    <tr class="bg-slate-100 text-slate-700 dark-grid-head font-bold">
                        <th class="py-2 border border-slate-200 w-10">限</th>
                        <th class="py-2 border border-slate-200">月</th>
                        <th class="py-2 border border-slate-200">火</th>
                        <th class="py-2 border border-slate-200">水</th>
                        <th class="py-2 border border-slate-200">木</th>
                        <th class="py-2 border border-slate-200">金</th>
                    </tr>
                </thead>
                <tbody id="timetable-grid-body"></tbody>
            </table>
        </div>

        <div id="view-edit" class="bg-white rounded-2xl shadow-xl p-6 w-full border border-slate-200 hidden">
            <h2 class="text-xl font-black text-slate-900 dark:text-white mb-4">⚙️ 時間割の登録・編集</h2>
            
            <form onsubmit="saveTimetable(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">曜日</label>
                        <select id="input-day" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm text-slate-800">
                            <option value="1">月曜日</option>
                            <option value="2">火曜日</option>
                            <option value="3">水曜日</option>
                            <option value="4">木曜日</option>
                            <option value="5">金曜日</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">時限</label>
                        <select id="input-period" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm text-slate-800">
                            <option value="1">1限 (8:45〜)</option>
                            <option value="2">2限 (10:30〜)</option>
                            <option value="3">3限 (13:15〜)</option>
                            <option value="4">4限 (15:00〜)</option>
                            <option value="5">5限 (16:45〜)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">講義名</label>
                    <input type="text" id="input-name" required placeholder="例：基礎有機化学" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm focus:outline-cyan-600 text-slate-800">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">建物（マップ連動）</label>
                        <select id="input-building" onchange="toggleCustomInput()" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm text-slate-800">
                            <option value="kyo-kita">共北</option>
                            <option value="kyo-minami">共南</option>
                            <option value="kyo-nishi">共西</option>
                            <option value="kyo-higashi">共東</option>
                            <option value="yoshidaminami1">1共</option>
                            <option value="yoshidaminami2">2共</option>
                            <option value="yoshidaminami3">3共</option>
                            <option value="yoshidaminami4">4共</option>
                            <option value="ilas">国際高等教育院棟</option>
                            <option value="media">学術情報メディアセンター</option>
                            <option value="custom">✨ リストにない場所を入力する</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">教室（詳細）</label>
                        <input type="text" id="input-room" required placeholder="例：32" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm focus:outline-cyan-600 text-slate-800">
                    </div>
                </div>

                <div id="custom-building-box" class="hidden space-y-4 bg-slate-50 dark:bg-slate-950 p-4 rounded-xl border border-dashed border-slate-300 dark:border-slate-700">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 dark:text-slate-300 mb-1">手動入力：建物名（画面表示用）</label>
                        <input type="text" id="input-custom-name" placeholder="例：北部総合館" class="w-full bg-white border border-slate-300 rounded-lg p-2 text-sm focus:outline-cyan-600 text-slate-800">
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-xs font-bold text-slate-600 dark:text-slate-300">手動入力：マップ埋め込みコード（任意）</label>
                            <span class="text-[10px] text-slate-400">空欄でも保存できます</span>
                        </div>
                        <textarea id="input-custom-iframe" rows="3" placeholder='<iframe src="https://..." ...></iframe>' class="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs focus:outline-cyan-600 font-mono text-slate-800"></textarea>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1">行き方ナビ（メモ）</label>
                    <textarea id="input-nav" rows="2" placeholder="例：総合館の4階。階段上がって右奥。" class="w-full bg-slate-50 border border-slate-300 rounded-lg p-2 text-sm focus:outline-cyan-600 text-slate-800"></textarea>
                </div>

                <div class="flex flex-col space-y-2 pt-2">
                    <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2.5 px-4 rounded-lg text-sm shadow-md transition-all cursor-pointer">
                        💾 変更を保存する
                    </button>
                    
                    <button type="button" id="delete-btn" onclick="deleteClass()" class="w-full bg-rose-50 hover:bg-rose-900 text-rose-600 dark:text-rose-400 font-bold py-2 px-4 rounded-lg text-sm transition-all cursor-pointer hidden border dark:border-rose-800">
                        🗑️ このマスの授業を削除
                    </button>
                </div>
            </form>

            <div class="mt-8 border-t border-slate-200 dark:border-slate-800 pt-4">
                <button onclick="clearAllData()" class="w-full text-slate-400 hover:text-slate-600 text-[10px] text-center tracking-widest uppercase transition-all cursor-pointer">
                    ⚠️ アプリの全データを初期化（リセット）
                </button>
            </div>
        </div>

    </main>

    <div id="detail-modal" class="fixed inset-0 bg-black/60 backdrop-blur-xs flex items-center justify-center p-4 z-50 hidden" onclick="closeDetailModal()">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-xs space-y-4 transform transition-all select-none dark-modal" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center">
                <span id="modal-slot-label" class="text-xs font-bold text-cyan-800 bg-cyan-50 dark:text-cyan-300 dark:bg-cyan-950 px-2 py-1 rounded-md border border-cyan-200 dark:border-cyan-800"></span>
                <button onclick="closeDetailModal()" class="text-slate-400 hover:text-slate-200 text-xl font-bold p-1 cursor-pointer">✕</button>
            </div>
            
            <div>
                <h3 id="modal-class-name" class="text-lg font-black text-slate-900 dark:text-white leading-tight mb-1"></h3>
                <p id="modal-class-room" class="text-sm text-amber-600 dark:text-amber-400 font-bold"></p>
            </div>

            <div class="bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl p-3 flex justify-around text-center text-xs">
                <div>
                    <span class="block text-[10px] text-slate-400 font-bold mb-0.5">出席</span>
                    <span id="modal-count-present" class="text-base font-black text-cyan-600 dark:text-cyan-400">0</span><span class="text-[10px] text-slate-500">回</span>
                </div>
                <div class="border-l border-slate-200 dark:border-slate-800"></div>
                <div>
                    <span class="block text-[10px] text-slate-400 font-bold mb-0.5">遅刻</span>
                    <span id="modal-count-late" class="text-base font-black text-amber-500 dark:text-amber-400">0</span><span class="text-[10px] text-slate-500">回</span>
                </div>
                <div class="border-l border-slate-200 dark:border-slate-800"></div>
                <div>
                    <span class="block text-[10px] text-slate-400 font-bold mb-1">欠席</span>
                    <span id="modal-count-absent" class="text-base font-black text-rose-500 dark:text-rose-400">0</span><span class="text-[10px] text-slate-500">回</span>
                </div>
            </div>

            <div>
                <span class="block text-[10px] text-slate-400 font-bold mb-1">🗺️ 行き方メモ</span>
                <p id="modal-class-nav" class="text-xs text-slate-700 dark:text-slate-200 bg-slate-50 dark:bg-slate-950 p-2.5 rounded-lg border border-slate-200 dark:border-slate-800 min-h-[40px] whitespace-pre-wrap"></p>
            </div>

            <div class="flex space-x-2 pt-1.5">
                <button onclick="closeDetailModal()" class="w-1/2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 font-bold py-2.5 rounded-xl text-xs transition-all border dark:border-slate-700 cursor-pointer">
                    ❌ 閉じる
                </button>
                <button id="modal-edit-btn" class="w-1/2 bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2.5 rounded-xl text-xs shadow-md transition-all cursor-pointer">
                    ⚙️ この授業を編集
                </button>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-xs text-slate-400">
        © 2026 KU Student App Project
    </footer>

            "yoshidaminami1": { name: "1共", embedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d204.20473056083998!2d135.78008265704312!3d35.024832403530006!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600108f7f0e72225%3A0x4bfbde8882e4ba6d!2z5Lqs6YO95aSn5a2mIOWQieeUsOWNlzHlj7fppKg!5e0!3m2!1sja!2sjp!4v1782136338103!5m2!1sja!2sjp" },
            "yoshidaminami2": { name: "2共", embedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d204.20888659469747!2d135.7804695144336!3d35.02316854048144!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600108f77e94d7e5%3A0xc340bcbd0d2efa42!2z5ZCJ55Sw5Y2X77yS5Y-36aSo!5e0!3m2!1sja!2sjp!4v1782136366021!5m2!1sja!2sjp" },
            "yoshidaminami3": { name: "3共", embedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d204.2096821866787!2d135.7800839468837!3d35.022850018346716!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60010960b90d7f8f%3A0x4960ed5765c6b0d2!2z5Lqs6YO95aSn5a2mIOWQieeUsOWNlzPlj7fppKjvvIgz5YWx77yJ!5e0!3m2!1sja!2sjp!4v1782136380865!5m2!1sja!2sjp" },
            "yoshidaminami4": { name: "4共", embedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d368.3086937650924!2d135.78063698166363!3d35.02254716293031!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600108f9dc239863%3A0x175e69652b4a2118!2z5Lqs6YO95aSn5a2mIOWQieeUsOWNlzTlj7fppKjvvIg05YWx77yJ!5e0!3m2!1sja!2sjp!4v1782136394689!5m2!1sja!2sjp" },
            "ilas": { name: "国際高等教育院棟", embedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d368.30329964179964!2d135.77955336751174!3d35.02374455004414!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600108f7913a6011%3A0x6a23bc0b345227aa!2z5Lqs6YO95aSn5a2mIOWbvemam-mrmOetieaVmeiCsumZouajn--8iElMQVPmo5_vvIk!5e0!3m2!1sja!2sjp!4v1782136421129!5m2!1sja!2sjp" },
            "media": { name: "学術情報メディアセンター", embedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d204.20950250807277!2d135.7796179130674!3d35.022921954452436!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x600108f77670e589%3A0xf4196e4ad1a354bd!2z5Lqs6YO95aSn5a2mIOWtpuihk-aDheWgseODoeODh-OCo-OCouOCu-ODs-OCv-ODvOWNl-mkqA!5e0!3m2!1sja!2sjp!4v1782136455143!5m2!1sja!2sjp" }
        };

        const timeFrames = {
            "1": { startHour: 8, startMin: 45, endHour: 10, endMin: 15 },
            "2": { startHour: 10, startMin: 30, endHour: 12, endMin: 0 },
            "3": { startHour: 13, startMin: 15, endHour: 14, endMin: 45 },
            "4": { startHour: 15, startMin: 0, endHour: 16, endMin: 30 },
            "5": { startHour: 16, startMin: 45, endHour: 18, endMin: 15 }
        };

        const dayNames = ["日", "月", "火", "水", "木", "金", "土"];

        // 🌗 高コントラスト版・ダークモード制御ロジック
        function initTheme() {
            const savedTheme = localStorage.getItem('ku_theme');
            const btn = document.getElementById('theme-btn');
            
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                if(btn) btn.innerText = "☀️";
            } else {
                document.documentElement.classList.remove('dark');
                if(btn) btn.innerText = "🌙";
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('ku_theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-btn').innerText = isDark ? "☀️" : "🌙";
        }

        initTheme();

        function toggleMap() {
            const container = document.getElementById('map-container');
            const btn = document.getElementById('map-toggle-btn');
            container.classList.toggle('hidden');
            btn.innerText = container.classList.contains('hidden') ? "🗺️ キャンパスマップを表示" : "❌ マップを閉じる";
        }

        function toggleCustomInput() {
            const select = document.getElementById('input-building').value;
            const customBox = document.getElementById('custom-building-box');
            if (select === 'custom') {
                customBox.classList.remove('hidden');
            } else {
                customBox.classList.add('hidden');
            }
        }

        function extractUrlFromIframe(htmlString) {
            if (!htmlString) return '';
            if (htmlString.trim().startsWith('http')) return htmlString.trim();
            const match = htmlString.match(/src=["']([^"']+)["']/);
            return match ? match[1] : '';
        }

        let timetable = JSON.parse(localStorage.getItem('kyodai_timetable')) || [];
        let currentActiveClass = null;
        let isPreviewMode = false;

        function switchTab(tabName) {
            const views = ['nav', 'table', 'edit'];
            views.forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`tab-${v}`).className = "w-1/3 py-2 rounded-lg text-cyan-200 hover:text-white cursor-pointer transition-all";
            });

            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            document.getElementById(`tab-${tabName}`).className = "w-1/3 py-2 rounded-lg bg-cyan-700 text-white cursor-pointer transition-all";

            if (tabName === 'nav') updateApp();
            if (tabName === 'table') generateTimetableGrid();
        }

        function handleGridClick(day, period) {
            const match = timetable.find(item => item.day === day && item.period === period);
            
            if (!match) {
                openEditForm(day, period);
                return;
            }

            const daysLabel = ["", "月", "火", "水", "木", "金"];
            document.getElementById('modal-slot-label').innerText = `${daysLabel[day]}曜 ${period}限`;
            document.getElementById('modal-class-name').innerText = match.name;
            
            let bName = "学内";
            if (match.building === 'custom') {
                bName = match.customBuildingName || "自由入力";
            } else if (buildingMaster[match.building]) {
                bName = buildingMaster[match.building].name;
            }
            document.getElementById('modal-class-room').innerText = `📍 ${bName} ${match.room}`;
            
            document.getElementById('modal-count-present').innerText = match.present || 0;
            document.getElementById('modal-count-late').innerText = match.late || 0;
            document.getElementById('modal-count-absent').innerText = match.absent || 0;
            document.getElementById('modal-class-nav').innerText = match.nav || "ナビ情報・メモはありません。";

            document.getElementById('modal-edit-btn').onclick = function() {
                closeDetailModal();
                openEditForm(day, period);
            };

            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
        }

        function openEditForm(day, period) {
            document.getElementById('input-day').value = day;
            document.getElementById('input-period').value = period;

            const match = timetable.find(item => item.day === day && item.period === period);
            const deleteBtn = document.getElementById('delete-btn');

            if (match) {
                document.getElementById('input-name').value = match.name;
                document.getElementById('input-room').value = match.room;
                document.getElementById('input-nav').value = match.nav || '';
                
                if (buildingMaster[match.building]) {
                    document.getElementById('input-building').value = match.building;
                } else {
                    document.getElementById('input-building').value = 'custom';
                    document.getElementById('input-custom-name').value = match.customBuildingName || '';
                    document.getElementById('input-custom-iframe').value = match.customEmbedUrl || '';
                }
                deleteBtn.classList.remove('hidden');
            } else {
                document.getElementById('input-name').value = '';
                document.getElementById('input-building').value = 'kyo-kita';
                document.getElementById('input-room').value = '';
                document.getElementById('input-nav').value = '';
                document.getElementById('input-custom-name').value = '';
                document.getElementById('input-custom-iframe').value = '';
                deleteBtn.classList.add('hidden');
            }

            toggleCustomInput();
            switchTab('edit');
        }

        function generateTimetableGrid() {
            const tbody = document.getElementById('timetable-grid-body');
            tbody.innerHTML = '';
            const periods = ["1", "2", "3", "4", "5"];

            periods.forEach(p => {
                const tr = document.createElement('tr');
                const tdLabel = document.createElement('td');
                tdLabel.className = "py-4 border border-slate-200 bg-slate-100 text-slate-800 font-bold dark-grid-label";
                tdLabel.innerText = p;
                tr.appendChild(tdLabel);

                for (let d = 1; d <= 5; d++) {
                    const td = document.createElement('td');
                    td.className = "p-2 border border-slate-200 h-20 vertical-middle transition-all cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 select-none text-[10px]";
                    td.setAttribute('onclick', `handleGridClick(${d}, '${p}')`);

                    const match = timetable.find(item => item.day === d && item.period === p);

                    if (match) {
                        // ダークモード時に黒背景の上でも文字線が完全に浮き出る明るめの紺枠セルに設定
                        td.className += " bg-cyan-50/90 text-cyan-950 dark:bg-cyan-900/40 dark:text-cyan-50 dark:border-cyan-700";
                        let bName = "学内";
                        if (match.building === 'custom') {
                            bName = match.customBuildingName || "自由入力";
                        } else if (buildingMaster[match.building]) {
                            bName = buildingMaster[match.building].name;
                        }
                        td.innerHTML = `<div class="font-black leading-tight break-all text-[11px] dark:text-cyan-200">${match.name}</div><div class="text-[10px] text-amber-600 dark:text-amber-400 font-bold mt-0.5 truncate">📍${bName} ${match.room}</div><div class="text-[9px] text-slate-500 dark:text-slate-300 font-mono mt-0.5 font-bold">出:${match.present} 遅:${match.late || 0} 欠:${match.absent}</div>`;
                    } else {
                        td.className += " text-slate-300 dark-grid-cell-empty text-xs";
                        td.innerText = "＋";
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        }

        function deleteClass() {
            const day = parseInt(document.getElementById('input-day').value);
            const period = document.getElementById('input-period').value;

            if (confirm("このマスの授業を削除しますか？")) {
                timetable = timetable.filter(item => !(item.day === day && item.period === period));
                localStorage.setItem('kyodai_timetable', JSON.stringify(timetable));
                alert("削除しました。");
                switchTab('table');
            }
        }

        function clearAllData() {
            if (confirm("【警告】登録したすべての時間割と出席カウントを完全に消去します。")) {
                localStorage.removeItem('kyodai_timetable');
                timetable = [];
                location.reload();
            }
        }

        function saveTimetable(event) {
            event.preventDefault();

            const day = parseInt(document.getElementById('input-day').value);
            const period = document.getElementById('input-period').value;
            const name = document.getElementById('input-name').value;
            const building = document.getElementById('input-building').value;
            const room = document.getElementById('input-room').value;
            const nav = document.getElementById('input-nav').value;

            let customBuildingName = '';
            let customEmbedUrl = '';

            if (building === 'custom') {
                customBuildingName = document.getElementById('input-custom-name').value || '自由場所';
                const rawIframe = document.getElementById('input-custom-iframe').value;
                if (rawIframe.trim() !== "") {
                    customEmbedUrl = extractUrlFromIframe(rawIframe);
                }
            }

            const existing = timetable.find(item => item.day === day && item.period === period);
            const presentCount = existing ? (existing.present || 0) : 0;
            const lateCount = existing ? (existing.late || 0) : 0;
            const absentCount = existing ? (existing.absent || 0) : 0;
            const hasPressed = existing ? (existing.hasPressed || null) : null;

            timetable = timetable.filter(item => !(item.day === day && item.period === period));

            timetable.push({
                id: `${day}-${period}`, day: day, period: period, name: name, building: building,
                customBuildingName: customBuildingName, customEmbedUrl: customEmbedUrl, room: room, nav: nav,
                startHour: timeFrames[period].startHour, startMin: timeFrames[period].startMin,
                endHour: timeFrames[period].endHour, endMin: timeFrames[period].endMin,
                present: presentCount, late: lateCount, absent: absentCount, hasPressed: hasPressed
            });

            localStorage.setItem('kyodai_timetable', JSON.stringify(timetable));
            alert("時間割を保存しました！");
            switchTab('table');
        }

        function recordAttendance(type) {
            if (!currentActiveClass || isPreviewMode) return;
            timetable = timetable.map(item => {
                if (item.id === currentActiveClass.id) {
                    if (type === 'present') item.present = (item.present || 0) + 1;
                    if (type === 'late') item.late = (item.late || 0) + 1;
                    if (type === 'absent') item.absent = (item.absent || 0) + 1;
                    item.hasPressed = type;
                }
                return item;
            });
            localStorage.setItem('kyodai_timetable', JSON.stringify(timetable));
            updateApp();
        }

        function undoAttendance() {
            if (!currentActiveClass || isPreviewMode) return;
            const target = timetable.find(item => item.id === currentActiveClass.id);
            if (!target || !target.hasPressed) return;
            const pressedType = target.hasPressed;

            timetable = timetable.map(item => {
                if (item.id === currentActiveClass.id) {
                    if (pressedType === 'present' && item.present > 0) item.present--;
                    if (pressedType === 'late' && item.late > 0) item.late--;
                    if (pressedType === 'absent' && item.absent > 0) item.absent--;
                    item.hasPressed = null;
                }
                return item;
            });
            localStorage.setItem('kyodai_timetable', JSON.stringify(timetable));
            updateApp();
        }

        function findNextClass(currentDay, currentHour, currentMin) {
            if (timetable.length === 0) return null;
            const nowTotal = currentHour * 60 + currentMin;
            let todayClasses = timetable.filter(item => item.day === currentDay).sort((a, b) => parseInt(a.period) - parseInt(b.period));
            
            for (let item of todayClasses) {
                if (nowTotal < (item.startHour * 60 + item.startMin)) return { item: item, isToday: true };
            }
            for (let i = 1; i <= 7; i++) {
                let checkDay = (currentDay + i) % 7;
                if (checkDay === 0 || checkDay === 6) continue;
                let nextDayClasses = timetable.filter(item => item.day === checkDay).sort((a, b) => parseInt(a.period) - parseInt(b.period));
                if (nextDayClasses.length > 0) return { item: nextDayClasses[0], isToday: false };
            }
            return null;
        }

        function updateApp() {
            const now = new Date();
            const currentDay = now.getDay(); 
            const currentHour = now.getHours();
            const currentMin = now.getMinutes();

            document.getElementById('current-time-display').innerText = `${currentHour}:${String(currentMin).padStart(2, '0')}`;
            currentActiveClass = null;
            isPreviewMode = false;
            let previewDayLabel = "";

            for (let item of timetable) {
                if (item.day === currentDay) {
                    const startTotal = item.startHour * 60 + item.startMin - 15;
                    const endTotal = item.endHour * 60 + item.endMin;
                    const nowTotal = currentHour * 60 + currentMin;
                    if (nowTotal >= startTotal && nowTotal <= endTotal) { currentActiveClass = item; break; }
                }
            }

            if (!currentActiveClass) {
                const nextData = findNextClass(currentDay, currentHour, currentMin);
                if (nextData) { currentActiveClass = nextData.item; isPreviewMode = true; previewDayLabel = nextData.isToday ? "今日の次の授業" : `次の授業 (${dayNames[nextData.item.day]}曜日)`; }
            }

            const labelEl = document.getElementById('status-label');
            const dotEl = document.getElementById('status-dot');
            const pingEl = document.getElementById('status-ping');
            const nameEl = document.getElementById('class-name');
            const roomEl = document.getElementById('class-room');
            const navEl = document.getElementById('class-nav');
            const btnEl = document.getElementById('attendance-btn');
            const lateBtn = document.getElementById('late-btn');
            const absentBtn = document.getElementById('absent-btn');
            const undoBtn = document.getElementById('undo-btn');
            const counterBox = document.getElementById('attendance-counter-box');
            const mapIframe = document.getElementById('map-iframe');
            const mapErrorEl = document.getElementById('map-error-message');

            if (currentActiveClass) {
                let displayBuilding = "学内"; let finalMapUrl = "";
                if (currentActiveClass.building === 'custom') { displayBuilding = currentActiveClass.customBuildingName; finalMapUrl = currentActiveClass.customEmbedUrl; }
                else if (buildingMaster[currentActiveClass.building]) { displayBuilding = buildingMaster[currentActiveClass.building].name; finalMapUrl = buildingMaster[currentActiveClass.building].embedUrl; }
                
                nameEl.innerText = currentActiveClass.name;
                roomEl.innerText = `📍 ${displayBuilding} ${currentActiveClass.room}`;
                navEl.innerText = currentActiveClass.nav || "ナビ情報はありません。";
                
                if (finalMapUrl) { mapIframe.src = finalMapUrl; mapIframe.classList.remove('hidden'); mapErrorEl.classList.add('hidden'); }
                else { mapIframe.src = ""; mapIframe.classList.add('hidden'); mapErrorEl.classList.remove('hidden'); }

                counterBox.classList.remove('hidden');
                document.getElementById('count-present').innerText = currentActiveClass.present || 0;
                document.getElementById('count-late').innerText = currentActiveClass.late || 0;
                document.getElementById('count-absent').innerText = currentActiveClass.absent || 0;

                if (isPreviewMode) {
                    labelEl.innerText = `⏭️ ${previewDayLabel} (${currentActiveClass.period}限)`;
                    dotEl.className = "relative inline-flex rounded-full h-2 w-2 bg-amber-500";
                    pingEl.classList.add('hidden');
                    btnEl.innerText = `🕒 時間外（${currentActiveClass.period}限の開始15分前から受付）`;
                    btnEl.disabled = true;
                    btnEl.className = "w-full bg-slate-200 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold py-4 px-4 rounded-xl text-sm cursor-not-allowed border dark:border-slate-700";
                    lateBtn.classList.add('hidden'); absentBtn.classList.add('hidden'); undoBtn.classList.add('hidden');
                } else {
                    labelEl.innerText = `🔴 現在の授業 (${currentActiveClass.period}限)`;
                    dotEl.className = "relative inline-flex rounded-full h-2 w-2 bg-cyan-500";
                    pingEl.classList.remove('hidden');
                    const hasPressedThisSlot = currentActiveClass.hasPressed;

                    if (hasPressedThisSlot) {
                        let statusText = hasPressedThisSlot === 'late' ? "遅刻" : (hasPressedThisSlot === 'absent' ? "欠寝" : "出席");
                        btnEl.innerText = `✓ ${statusText}記録済み`; btnEl.disabled = true;
                        btnEl.className = "w-full bg-slate-200 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold py-4 px-4 rounded-xl text-lg cursor-not-allowed border dark:border-slate-700";
                        lateBtn.classList.add('hidden'); absentBtn.classList.add('hidden'); undoBtn.classList.remove('hidden');
                    } else {
                        btnEl.innerText = `🔴 ${currentActiveClass.period}限の出席を記録`; btnEl.disabled = false;
                        btnEl.className = "w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg text-lg cursor-pointer";
                        lateBtn.classList.remove('hidden'); absentBtn.classList.remove('hidden'); undoBtn.classList.add('hidden');
                    }
                }
            } else {
                labelEl.innerText = "授業データがありません";
                nameEl.innerText = "時間割が未登録です"; roomEl.innerText = "📍 -";
                navEl.innerText = "「時間割表」から授業を入力してください！";
                btnEl.innerText = "🔴 出席ボタン（時間外）"; btnEl.disabled = true;
                btnEl.className = "w-full bg-slate-300 dark:bg-slate-800 text-slate-500 dark:text-slate-400 font-bold py-4 px-4 rounded-xl text-lg cursor-not-allowed";
                mapIframe.src = buildingMaster["kyo-kita"].embedUrl;
                lateBtn.classList.add('hidden'); absentBtn.classList.add('hidden'); undoBtn.classList.add('hidden'); counterBox.classList.add('hidden');
            }
        }

        updateApp();
        setInterval(updateApp, 60000);
    </script>
